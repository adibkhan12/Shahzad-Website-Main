{% load static %}
<header class="sticky top-0 z-40 bg-white/80 backdrop-blur border-b border-neutral-200">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16" x-data="{open:false}">
            <div class="flex items-center gap-8">
                <a href="{% url 'catalog:home' %}" class="flex items-center gap-2">
                    <span class="inline-flex w-8 h-8 rounded-lg bg-gradient-to-br from-brand to-brand-700 items-center justify-center text-white text-base">📱</span>
                    <span class="font-semibold text-lg tracking-tight">{{ BRAND.name }} <span class="text-neutral-400 text-xs font-normal hidden sm:inline">Elec.</span></span>
                </a>
                <nav class="hidden md:flex items-center gap-6 text-sm text-neutral-700">
                    <a href="{% url 'catalog:home' %}" class="hover:text-brand">Home</a>
                    <a href="{% url 'catalog:product_list' %}" class="hover:text-brand">Shop</a>
                    <a href="/repairs/" class="hover:text-brand inline-flex items-center gap-1">Repairs <span class="text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded-full">30 min</span></a>
                    <a href="#categories" class="hover:text-brand">Categories</a>
                </nav>
            </div>

            <form action="{% url 'catalog:product_list' %}" method="get" class="hidden md:flex items-center flex-1 max-w-md mx-8">
                <div class="relative w-full">
                    <input name="q" value="{{ request.GET.q|default_if_none:'' }}" placeholder="Search products…"
                        class="w-full rounded-full border border-neutral-200 bg-neutral-50 pl-10 pr-4 py-2 text-sm focus:border-brand focus:bg-white focus:ring-2 focus:ring-brand/20 outline-none transition">
                    <svg class="absolute left-3 top-2.5 w-4 h-4 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 10a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </form>

            <div class="flex items-center gap-3">
                {% if user.is_authenticated %}
                    <a href="/account/" class="text-sm text-neutral-700 hover:text-brand hidden sm:inline">Account</a>
                    <a href="/accounts/logout/" class="text-sm text-neutral-500 hover:text-brand hidden sm:inline">Sign out</a>
                {% else %}
                    <a href="/accounts/login/" class="text-sm text-neutral-700 hover:text-brand hidden sm:inline">Sign in</a>
                {% endif %}
                <a href="/wishlist/" class="p-2 rounded-full hover:bg-neutral-100 text-neutral-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                </a>
                <a href="{% url 'cart:page' %}" class="p-2 rounded-full hover:bg-neutral-100 text-neutral-700 relative"
                   hx-get="{% url 'cart:badge' %}" hx-trigger="cart:updated from:body" hx-target="#cart-badge" hx-swap="outerHTML">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-brand text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] px-1 flex items-center justify-center {% if not CART_COUNT %}hidden{% endif %}">{{ CART_COUNT }}</span>
                </a>
                <button @click="open=!open" class="md:hidden p-2 rounded-md hover:bg-neutral-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
            </div>
        </div>
    </div>
</header>
