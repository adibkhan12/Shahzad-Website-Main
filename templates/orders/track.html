{% extends "base.html" %}
{% block title %}Track order{% endblock %}
{% block body %}
<div class="mx-auto max-w-3xl px-6 py-10">
    <h1 class="text-3xl font-bold mb-2">Track your order</h1>
    <p class="text-neutral-500">Enter your order reference and email to see status.</p>

    <form method="get" class="mt-6 bg-white rounded-2xl border border-neutral-100 p-6 grid md:grid-cols-[1fr_1fr_auto] gap-3">
        <input name="ref" value="{{ reference }}" placeholder="Order reference (e.g. d3ab12ef…)" class="rounded-xl border border-neutral-200 px-4 py-2.5 outline-none focus:border-brand">
        <input name="email" type="email" value="{{ email }}" placeholder="Email" class="rounded-xl border border-neutral-200 px-4 py-2.5 outline-none focus:border-brand">
        <button class="bg-brand hover:bg-brand-700 text-white px-6 py-2.5 rounded-xl font-medium">Track</button>
    </form>

    {% if error %}<div class="mt-4 p-4 rounded-xl bg-red-50 text-red-700 text-sm">{{ error }}</div>{% endif %}

    {% if order %}
    <div class="mt-6">
        {% include "orders/detail.html" with order=order %}
    </div>
    {% endif %}
</div>
{% endblock %}
