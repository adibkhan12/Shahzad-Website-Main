{% with in_wl=product.id|stringformat:'s' %}
<button id="heart-{{ product.id }}"
    hx-post="{% url 'wishlist:toggle' product.id %}" hx-target="this" hx-swap="outerHTML"
    class="p-3 rounded-full border border-neutral-200 hover:border-brand transition {% if product.id in WISHLIST_IDS or in_wishlist %}text-brand border-brand{% else %}text-neutral-500 hover:text-brand{% endif %}">
    <svg class="w-5 h-5" fill="{% if product.id in WISHLIST_IDS or in_wishlist %}currentColor{% else %}none{% endif %}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
</button>
{% endwith %}
