[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    "backend/venv",
    "backend/staticfiles",
    "backend/media",
    "**/migrations/*",
    "frontend",
]

[tool.ruff.lint]
# Conservative starter set: pycodestyle, pyflakes, warnings, isort, pyupgrade.
# Ratchet up later once the codebase is clean.
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",  # line-too-long is handled by the formatter
]

[tool.ruff.lint.per-file-ignores]
"backend/apps/*/migrations/*" = ["E", "F", "I", "UP"]
"backend/manage.py" = ["E", "F"]
