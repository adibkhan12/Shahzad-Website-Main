<!--
  Shahzad Mobile — LOCKUP (badge + wordmark, horizontal)
  Use for page headers, email signatures, printed letterheads.
  Font: Inter (falls back gracefully if Inter isn't installed).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64"
     role="img" aria-label="Shahzad Mobile">
  <title>Shahzad Mobile</title>
  <defs>
    <linearGradient id="l-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1A0F2E"/>
      <stop offset="55%"  stop-color="#0F2A44"/>
      <stop offset="100%" stop-color="#123A5C"/>
    </linearGradient>
    <linearGradient id="l-acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
  <!-- Badge -->
  <g>
    <rect width="64" height="64" rx="14" fill="url(#l-bg)"/>
    <rect x="0.5" y="0.5" width="63" height="63" rx="13.5"
          fill="none" stroke="url(#l-acc)" stroke-width="1" opacity="0.4"/>
    <g fill="none" stroke="#FFFFFF"
       stroke-width="3.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 28 14 L 10 14 L 10 30 L 28 30 L 28 46 L 10 46"/>
      <path d="M 34 46 L 34 14 L 44 30 L 54 14 L 54 46"/>
    </g>
    <circle cx="54" cy="50" r="2.5" fill="url(#l-acc)"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(82, 0)" fill="currentColor">
    <text x="0" y="32"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-weight="700" font-size="22" letter-spacing="-0.8"
          dominant-baseline="central">SHAHZAD</text>
    <text x="0" y="50"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-weight="500" font-size="9" letter-spacing="2.4"
          dominant-baseline="central" opacity="0.65">MOBILE &amp; ELECTRONICS</text>
  </g>
</svg>
