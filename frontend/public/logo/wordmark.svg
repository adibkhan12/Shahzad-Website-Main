<!--
  Shahzad Mobile — WORDMARK (text only)
  Use when the badge is redundant or space-constrained.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 52"
     role="img" aria-label="Shahzad Mobile">
  <title>Shahzad Mobile</title>
  <defs>
    <linearGradient id="w-acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
  <g fill="currentColor">
    <text x="0" y="24"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-weight="700" font-size="26" letter-spacing="-0.9"
          dominant-baseline="central">SHAHZAD</text>
    <text x="0" y="44"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-weight="500" font-size="10" letter-spacing="2.8"
          dominant-baseline="central" opacity="0.65">MOBILE &amp; ELECTRONICS</text>
  </g>
  <!-- Signature underline accent (tiny gradient bar) -->
  <rect x="148" y="5" width="12" height="2" rx="1" fill="url(#w-acc)" opacity="0.9"/>
</svg>
