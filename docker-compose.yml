# Single-deployment Docker Compose for production.
# Two services: Postgres + a single Django+Angular container.
# The container serves the API at /api/v1/, the admin at /admin/, and the
# Angular SPA at every other path.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shahzad_ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adib}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-adib}@db:5432/${POSTGRES_DB:-shahzad_ecommerce}
      # Override .env values that assume runserver (port 8000) — Docker exposes port 80.
      SECURE_SSL_REDIRECT: "False"
      SITE_URL: "http://localhost"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "80:8000"

volumes:
  postgres_data:
  static_volume:
  media_volume:
