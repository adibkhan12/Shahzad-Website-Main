[pytest]
DJANGO_SETTINGS_MODULE = config.settings.dev
# Discover both legacy `tests.py` files and pytest-style `test_*.py` modules.
python_files = tests.py test_*.py
testpaths = apps
# --reuse-db speeds up reruns by keeping the test schema between sessions.
# Drop with --create-db when you change models.
addopts = -v --tb=short --reuse-db --no-header
